<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASCOM - Paróquia Santo Antônio de Lisboa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-paroquia { background-color: #FDFBF7; }
        .marrom-paroquia { background-color: #5D4037; }
    </style>
</head>
<body class="bg-paroquia text-stone-900 font-sans">

    <header class="marrom-paroquia text-white p-6 shadow-md text-center">
        <h1 class="text-2xl font-bold uppercase tracking-wide">Paróquia Santo Antônio de Lisboa</h1>
        <p class="text-amber-200 text-xs font-bold italic">GESTÃO DE MÍDIA PASTORAL</p>
    </header>

    <div class="max-w-4xl mx-auto p-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200 mb-10">
            <h2 class="text-lg font-bold mb-4 text-stone-700">Nova Demanda de Mídia</h2>
            <div class="grid gap-4">
                <input type="text" id="novo-titulo" placeholder="Título da Postagem (ex: Missa de Domingo)" class="p-3 border rounded-lg w-full outline-none focus:ring-2 focus:ring-amber-500">
                <textarea id="nova-descricao" placeholder="Descrição ou detalhes da arte..." class="p-3 border rounded-lg w-full outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                
                <div class="grid gap-1">
                    <label class="text-xs font-bold text-stone-500 uppercase ml-1">Data de Prazo de Conclusão</label>
                    <div class="flex gap-4">
                        <input type="date" id="novo-prazo" class="p-3 border rounded-lg flex-1 outline-none focus:ring-2 focus:ring-amber-500">
                        <button onclick="cadastrarPostagem()" id="btn-salvar" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-6 rounded-lg transition-all">
                            Salvar Postagem
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <hr class="mb-10 border-stone-200">

        <h2 class="text-xl font-bold mb-6 text-stone-800">Postagens Recentes</h2>
        <div id="loading" class="text-center py-10 text-stone-500">Conectando ao banco...</div>
        <div id="lista-demandas" class="grid gap-6"></div>
    </div>

    <script>
        const SB_URL = 'https://qasngjqoireicqwjcvgh.supabase.co'; 
        const SB_KEY = 'sb_publishable_pE-axaIPOEd0KCeoh3P6tg_4zbdwLq4';
        const meuSupabase = supabase.createClient(SB_URL, SB_KEY);

        // Formata data para o padrão Brasileiro DD/MM/AAAA
        function formatarDataBR(dataEstrangeira) {
            if (!dataEstrangeira) return "A definir";
            const [ano, mes, dia] = dataEstrangeira.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        async function carregarDados() {
            const lista = document.getElementById('lista-demandas');
            const loading = document.getElementById('loading');

            try {
                const { data, error } = await meuSupabase
                    .from('postagens')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                loading.style.display = 'none';

                if (data && data.length > 0) {
                    lista.innerHTML = data.map(item => `
                        <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 ${item.status === 'Aprovado' ? 'border-green-500' : 'border-amber-500'}">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-bold uppercase px-2 py-1 rounded ${item.status === 'Aprovado' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${item.status || 'Pendente'}</span>
                                <span class="text-xs text-stone-400 font-medium italic">Prazo: ${formatarDataBR(item.data_prazo)}</span>
                            </div>
                            <h3 class="font-bold text-lg text-stone-800">${item.titulo}</h3>
                            <p class="text-stone-600 text-sm mt-1 mb-6">${item.descricao || 'Sem descrição'}</p>
                            
                            <div class="flex justify-between items-center border-t pt-4">
                                <div>
                                    ${item.status !== 'Aprovado' ? `
                                        <button onclick="aprovarPostagem('${item.id}')" class="bg-green-600 hover:bg-green-700 text-white text-[10px] font-bold uppercase px-4 py-2 rounded shadow-sm transition-all">
                                            Aprovar
                                        </button>
                                    ` : '<span class="text-green-600 text-[10px] font-bold uppercase italic font-black">✓ Arte Aprovada</span>'}
                                </div>
                                
                                <button onclick="excluirPostagem('${item.id}', '${item.titulo}')" class="text-red-500 hover:bg-red-50 text-[10px] font-bold uppercase px-3 py-2 rounded border border-red-100 transition-all">
                                    Excluir Registro
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    lista.innerHTML = '<p class="text-center text-stone-400 italic">Nenhuma postagem encontrada.</p>';
                }
            } catch (err) {
                loading.innerHTML = `<div class="text-red-500">Erro: ${err.message}</div>`;
            }
        }

        async function cadastrarPostagem() {
            const btn = document.getElementById('btn-salvar');
            const titulo = document.getElementById('novo-titulo').value;
            const descricao = document.getElementById('nova-descricao').value;
            const data_prazo = document.getElementById('novo-prazo').value;

            if (!titulo) return alert("Por favor, digite um título!");

            btn.disabled = true;
            btn.innerText = "Salvando...";

            try {
                const { error } = await meuSupabase
                    .from('postagens')
                    .insert([{ titulo, descricao, data_prazo, status: 'Pendente' }]);

                if (error) throw error;
                location.reload();
            } catch (err) {
                alert("Erro ao salvar: " + err.message);
                btn.disabled = false;
                btn.innerText = "Salvar Postagem";
            }
        }

        async function aprovarPostagem(id) {
            if (!confirm("Confirmar a aprovação desta arte para a Paróquia?")) return;
            try {
                const { error } = await meuSupabase.from('postagens').update({ status: 'Aprovado' }).eq('id', id);
                if (error) throw error;
                location.reload();
            } catch (err) { alert("Erro ao aprovar: " + err.message); }
        }

        async function excluirPostagem(id, titulo) {
            const confirmacao = confirm(`⚠️ ATENÇÃO!\n\nVocê está prestes a apagar permanentemente a demanda: "${titulo}".\n\nEsta ação não pode ser desfeita. Deseja continuar?`);

            if (confirmacao) {
                try {
                    const { error } = await meuSupabase.from('postagens').delete().eq('id', id);
                    if (error) throw error;
                    location.reload();
                } catch (err) { alert("Erro ao excluir: " + err.message); }
            }
        }

        carregarDados();
    </script>
</body>
</html>
