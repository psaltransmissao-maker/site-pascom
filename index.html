<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASCOM - Paróquia Santo Antônio de Lisboa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .marrom-psal { background-color: #5D4037; }
        .card-form { background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .input-psal { background-color: #f1f5f9; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .input-psal:focus { border-color: #5D4037; background-color: #ffffff; ring: 2px; outline: none; box-shadow: 0 0 0 2px #5D4037; }
        .aba-ativa { color: #5D4037; border-bottom: 3px solid #5D4037; font-weight: 700; }
    </style>
</head>
<body class="text-slate-800">

    <header class="marrom-psal text-white py-8 px-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold tracking-tight">Paróquia Santo Antônio de Lisboa</h1>
        <p class="text-stone-300 text-xs mt-1 uppercase tracking-widest font-medium">Gestão de Mídia Pastoral</p>
    </header>

    <nav class="flex justify-center bg-white border-b border-slate-200 sticky top-0 z-50">
        <button onclick="mudarAba('solicitante')" id="btn-solicitante" class="px-8 py-4 text-sm uppercase tracking-wider aba-ativa">Solicitante</button>
        <button onclick="mudarAba('admin')" id="btn-admin" class="px-8 py-4 text-sm uppercase tracking-wider text-slate-400 font-medium">Equipe de Produção</button>
    </nav>

    <main class="max-w-2xl mx-auto p-6 md:p-10">
        
        <div id="view-solicitante">
            <div class="card-form p-8 md:p-10">
                <div class="mb-8 border-b border-slate-100 pb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Solicitar Arte</h2>
                    <p class="text-slate-500 mt-1">Preencha os dados e anexe seu arquivo de referência.</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Pastoral / Comunidade</label>
                        <select id="sol-pastoral" class="input-psal w-full p-4 rounded-xl outline-none">
                            <option value="">Selecione...</option>
                            <option>Acólitos e Coroinhas</option><option>Apostolado da Oração</option><option>Campanha de Arrecadação de Alimentos</option><option>Casa de Acolhimento Madre Tereza</option><option>Com. Nossa Senhora de Fátima</option><option>Com. São Domingos de Gusmão</option><option>Com. São João Batista</option><option>Com. São Mateus</option><option>Coral</option><option>Mesce</option><option>Missão de Fátima</option><option>Oficinas de Oração</option><option>Paroquia Sto. Antônio de Lisboa - Matriz</option><option>Pascom</option><option>Pastoral Acolhida</option><option>Pastoral Batismo</option><option>Pastoral Canto Litúrgico</option><option>Pastoral da Catequese</option><option>Pastoral da Criança</option><option>Pastoral da Saúde</option><option>Pastoral da Sobriedade</option><option>Pastoral do Dízimo</option><option>Pastoral Familiar</option><option>Pastoral Litúrgica</option><option>RCC</option><option>Setor da Juventude</option><option>Terço dos Homens</option><option>Vicentinos</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="sol-nome" placeholder="Seu Nome" class="input-psal w-full p-4 rounded-xl outline-none">
                        <input type="tel" id="sol-tel" placeholder="WhatsApp (00) 00000-0000" class="input-psal w-full p-4 rounded-xl outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Título (Tipo de Solicitação)</label>
                        <select id="sol-tipo" class="input-psal w-full p-4 rounded-xl outline-none">
                            <option value="">Selecione...</option>
                            <option>Aviso para comunicados</option>
                            <option>Criação de arte para divulgação</option>
                            <option>Evento a ser divulgado</option>
                            <option>Outros</option>
                        </select>
                    </div>

                    <textarea id="sol-desc" rows="4" placeholder="Descrição detalhada (Local, mensagens, horários...)" class="input-psal w-full p-4 rounded-xl outline-none"></textarea>

                    <div class="p-4 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Anexar Referência (Imagem ou PDF)</label>
                        <p class="text-[10px] text-slate-400 mb-3 italic">Opcional: Envie uma imagem de exemplo</p>
                        <input type="file" id="sol-arquivo" accept="image/*,application/pdf" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-stone-200 file:text-stone-700 hover:file:bg-stone-300">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Data desejada para divulgação</label>
                        <input type="date" id="sol-prazo" class="input-psal w-full p-4 rounded-xl outline-none">
                    </div>

                    <button onclick="enviarPedido()" id="btn-salvar" class="marrom-psal w-full text-white font-bold py-5 rounded-2xl shadow-xl hover:opacity-90 transition-all uppercase text-sm">
                        Enviar para Equipe de Mídia
                    </button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <div id="login-admin" class="card-form p-10 text-center">
                <h2 class="text-xl font-bold mb-6 text-slate-800">Painel Equipe Pascom</h2>
                <input type="password" id="senha-admin" placeholder="Senha" class="input-psal w-full p-4 rounded-xl text-center mb-4 outline-none">
                <button onclick="autenticarAdmin()" class="marrom-psal w-full text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest">Entrar</button>
            </div>

            <div id="conteudo-admin" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h2 class="font-bold text-lg text-slate-800">Fila de Demandas</h2>
                    <button onclick="carregarDados()" class="text-xs font-bold text-slate-400 uppercase">Atualizar ↻</button>
                </div>
                <div id="lista-demandas" class="grid gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://qasngjqoireicqwjcvgh.supabase.co'; 
        const SB_KEY = 'sb_publishable_pE-axaIPOEd0KCeoh3P6tg_4zbdwLq4';
        const meuSupabase = supabase.createClient(SB_URL, SB_KEY);
        const SENHA_CORRETA = "psal2026"; 

        function mudarAba(aba) {
            document.getElementById('view-solicitante').classList.toggle('hidden', aba === 'admin');
            document.getElementById('view-admin').classList.toggle('hidden', aba === 'solicitante');
            document.getElementById('btn-solicitante').classList.toggle('aba-ativa', aba === 'solicitante');
            document.getElementById('btn-admin').classList.toggle('aba-ativa', aba === 'admin');
        }

        function autenticarAdmin() {
            if (document.getElementById('senha-admin').value === SENHA_CORRETA) {
                document.getElementById('login-admin').classList.add('hidden');
                document.getElementById('conteudo-admin').classList.remove('hidden');
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const lista = document.getElementById('lista-demandas');
            const { data } = await meuSupabase.from('postagens').select('*').order('created_at', { ascending: false });
            if (data) {
                lista.innerHTML = data.map(item => {
                    const p = item.descricao.split(' | ');
                    const fileUrl = p[4] ? `${SB_URL}/storage/v1/object/public/referencias/${p[4]}` : null;

                    return `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 ${item.status === 'Aprovado' ? 'border-green-500' : 'border-amber-500'}">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-[10px] font-bold text-amber-600 uppercase">${p[0]}</p>
                                <h3 class="font-bold text-slate-800">${item.titulo}</h3>
                                <p class="text-[10px] text-slate-500">Solicitante: <b>${p[1]}</b></p>
                            </div>
                            <span class="text-[9px] bg-slate-100 px-2 py-1 rounded font-bold uppercase">${item.status}</span>
                        </div>
                        <p class="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg my-3 border border-slate-100">${p[2]}</p>
                        
                        ${fileUrl ? `<div class="mb-4 p-2 bg-blue-50 rounded-lg flex justify-between items-center"><span class="text-[10px] font-bold text-blue-700">📄 REFERÊNCIA ANEXADA</span><a href="${fileUrl}" target="_blank" class="bg-blue-600 text-white px-3 py-1 rounded text-[9px] uppercase">Ver Arquivo</a></div>` : ''}

                        ${item.status !== 'Aprovado' ? `
                            <div class="mt-4 p-3 bg-stone-50 rounded-xl border border-stone-200">
                                <label class="text-[9px] font-black uppercase text-stone-400 block mb-1">Link da Arte Pronta (Canva/Drive):</label>
                                <div class="flex gap-2">
                                    <input type="text" id="link-final-${item.id}" placeholder="Cole o link aqui..." class="flex-1 p-2 text-xs border rounded-lg outline-none">
                                    <button onclick="finalizar('${item.id}', '${p[1]}', '${p[3]}', '${item.titulo}', '${p[4]}')" class="bg-green-600 text-white font-bold text-[10px] px-4 py-2 rounded-lg uppercase">Finalizar</button>
                                </div>
                            </div>
                        ` : ''}

                        <div class="flex justify-between items-center mt-4">
                            <span class="text-[10px] font-bold text-slate-400">PRAZO: ${item.data_prazo ? item.data_prazo.split('-').reverse().join('/') : '--'}</span>
                            <button onclick="deletar('${item.id}', '${p[4]}')" class="text-red-300 font-bold text-[9px] uppercase">Excluir</button>
                        </div>
                    </div>
                `}).join('');
            }
        }

        async function enviarPedido() {
            const btn = document.getElementById('btn-salvar');
            const fileInput = document.getElementById('sol-arquivo');
            const file = fileInput.files[0];
            let fileName = "";

            if (!document.getElementById('sol-pastoral').value || !document.getElementById('sol-nome').value) return alert("Preencha a Pastoral e seu Nome!");

            btn.innerText = "ENVIANDO AGUARDE..."; btn.disabled = true;

            if (file) {
                fileName = `${Date.now()}-${file.name}`;
                await meuSupabase.storage.from('referencias').upload(fileName, file);
            }

            const descFinal = `${document.getElementById('sol-pastoral').value} | ${document.getElementById('sol-nome').value} | ${document.getElementById('sol-desc').value} | ${document.getElementById('sol-tel').value.replace(/\D/g,'')} | ${fileName}`;

            const { error } = await meuSupabase.from('postagens').insert([{ titulo: document.getElementById('sol-tipo').value, descricao: descFinal, status: 'Pendente', data_prazo: document.getElementById('sol-prazo').value }]);

            if (error) { alert(error.message); btn.disabled = false; }
            else { alert("Solicitação enviada com sucesso!"); location.reload(); }
        }

        async function finalizar(id, nome, tel, titulo, fileName) {
            const linkArte = document.getElementById(`link-final-${id}`).value;
            if (!linkArte) return alert("Insira o link da arte finalizada!");
            
            // 1. WhatsApp
            const msg = window.encodeURIComponent(`Olá ${nome}! 🙏 Aqui é da PASCOM. Sua arte para "${titulo}" está pronta! Acesse aqui: ${linkArte}`);
            window.open(`https://wa.me/55${tel}?text=${msg}`, '_blank');

            // 2. Apagar arquivo do Storage
            if (fileName && fileName !== "undefined") await meuSupabase.storage.from('referencias').remove([fileName]);

            // 3. Status
            await meuSupabase.from('postagens').update({ status: 'Aprovado' }).eq('id', id);
            carregarDados();
        }

        async function deletar(id, fileName) {
            if(!confirm("Excluir este pedido?")) return;
            if (fileName && fileName !== "undefined") await meuSupabase.storage.from('referencias').remove([fileName]);
            await meuSupabase.from('postagens').delete().eq('id', id);
            carregarDados();
        }
    </script>
</body>
</html>
