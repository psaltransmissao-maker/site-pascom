<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASCOM - Paróquia Santo Antônio de Lisboa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .marrom-psal { background-color: #5D4037; }
        .card-form { background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .input-psal { background-color: #f1f5f9; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .input-psal:focus { border-color: #5D4037; background-color: #ffffff; ring: 2px; outline: none; box-shadow: 0 0 0 2px #5D4037; }
        .aba-ativa { color: #5D4037; border-bottom: 3px solid #5D4037; font-weight: 700; }
    </style>
</head>
<body class="text-slate-800">

    <header class="marrom-psal text-white py-8 px-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold tracking-tight">Paróquia Santo Antônio de Lisboa</h1>
        <p class="text-stone-300 text-xs mt-1 uppercase tracking-widest font-medium">Gestão de Mídia Pastoral</p>
    </header>

    <nav class="flex justify-center bg-white border-b border-slate-200 sticky top-0 z-50">
        <button onclick="mudarAba('solicitante')" id="btn-solicitante" class="px-8 py-4 text-sm uppercase tracking-wider aba-ativa">Solicitante</button>
        <button onclick="mudarAba('admin')" id="btn-admin" class="px-8 py-4 text-sm uppercase tracking-wider text-slate-400 font-medium">Equipe de Produção</button>
    </nav>

    <main class="max-w-2xl mx-auto p-6 md:p-10">
        
        <div id="view-solicitante">
            <div class="card-form p-8 md:p-10">
                <div class="mb-8 border-b border-slate-100 pb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Solicitar Arte</h2>
                    <p class="text-slate-500 mt-1">Preencha os dados abaixo para enviar sua demanda.</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Sua Pastoral / Movimento / Comunidade</label>
                        <select id="solicitante-pastoral" class="input-psal w-full p-4 rounded-xl outline-none cursor-pointer">
                            <option value="">Selecione...</option>
                            <option>Acólitos e Coroinhas</option>
                            <option>Apostolado da Oração</option>
                            <option>Campanha de Arrecadação de Alimentos</option>
                            <option>Casa de Acolhimento Madre Tereza</option>
                            <option>Com. Nossa Senhora de Fátima</option>
                            <option>Com. São Domingos de Gusmão</option>
                            <option>Com. São João Batista</option>
                            <option>Com. São Mateus</option>
                            <option>Coral</option>
                            <option>Mesce</option>
                            <option>Missão de Fátima</option>
                            <option>Oficinas de Oração</option>
                            <option>Paroquia Sto. Antônio de Lisboa - Matriz</option>
                            <option>Pascom</option>
                            <option>Pastoral Acolhida</option>
                            <option>Pastoral Batismo</option>
                            <option>Pastoral Canto Litúrgico</option>
                            <option>Pastoral da Catequese</option>
                            <option>Pastoral da Criança</option>
                            <option>Pastoral da Saúde</option>
                            <option>Pastoral da Sobriedade</option>
                            <option>Pastoral do Dízimo</option>
                            <option>Pastoral Familiar</option>
                            <option>Pastoral Litúrgica</option>
                            <option>RCC</option>
                            <option>Setor da Juventude</option>
                            <option>Terço dos Homens</option>
                            <option>Vicentinos</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Nome do Responsável pelo Pedido</label>
                        <input type="text" id="solicitante-nome" placeholder="Seu nome completo" class="input-psal w-full p-4 rounded-xl outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Telefone de Contato (WhatsApp)</label>
                        <input type="tel" id="solicitante-tel" placeholder="(00) 00000-0000" class="input-psal w-full p-4 rounded-xl outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Tipo de Solicitação</label>
                        <select id="novo-titulo" class="input-psal w-full p-4 rounded-xl outline-none cursor-pointer">
                            <option value="">Selecione...</option>
                            <option>Aviso para comunicados</option>
                            <option>Criação de arte para divulgação</option>
                            <option>Evento a ser divulgado</option>
                            <option>Outros</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Descrição e Texto da Arte</label>
                        <textarea id="nova-descricao" rows="4" placeholder="Descreva os detalhes importantes que devem conter na arte..." class="input-psal w-full p-4 rounded-xl outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Data de Prazo de Conclusão</label>
                        <input type="date" id="novo-prazo" class="input-psal w-full p-4 rounded-xl outline-none">
                    </div>

                    <button onclick="cadastrarPostagem()" id="btn-salvar" class="marrom-psal w-full text-white font-bold py-5 rounded-2xl shadow-xl hover:opacity-90 transition-all transform active:scale-[0.98] mt-4 uppercase tracking-widest text-sm">
                        Enviar para Produção
                    </button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <div id="login-admin" class="card-form p-10 text-center">
                <div class="w-16 h-16 marrom-psal rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold mb-6">Acesso Equipe Pascom</h2>
                <input type="password" id="senha-admin" placeholder="Senha" class="input-psal w-full p-4 rounded-xl text-center mb-4 outline-none">
                <button onclick="autenticarAdmin()" class="marrom-psal w-full text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest">Entrar</button>
            </div>

            <div id="conteudo-admin" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h2 class="font-bold text-lg text-slate-800">Painel de Demandas</h2>
                    <span id="contador" class="bg-slate-200 text-slate-600 text-xs font-bold px-3 py-1 rounded-full">0</span>
                </div>
                <div id="lista-demandas" class="grid gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://qasngjqoireicqwjcvgh.supabase.co'; 
        const SB_KEY = 'sb_publishable_pE-axaIPOEd0KCeoh3P6tg_4zbdwLq4';
        const meuSupabase = supabase.createClient(SB_URL, SB_KEY);
        const SENHA_CORRETA = "psal2026"; 

        function mudarAba(aba) {
            document.getElementById('view-solicitante').classList.toggle('hidden', aba === 'admin');
            document.getElementById('view-admin').classList.toggle('hidden', aba === 'solicitante');
            document.getElementById('btn-solicitante').classList.toggle('aba-ativa', aba === 'solicitante');
            document.getElementById('btn-admin').classList.toggle('aba-ativa', aba === 'admin');
        }

        function autenticarAdmin() {
            if (document.getElementById('senha-admin').value === SENHA_CORRETA) {
                document.getElementById('login-admin').classList.add('hidden');
                document.getElementById('conteudo-admin').classList.remove('hidden');
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const lista = document.getElementById('lista-demandas');
            const { data, error } = await meuSupabase.from('postagens').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('contador').innerText = data.length;
                lista.innerHTML = data.map(item => {
                    const parts = item.descricao.split(' | ');
                    const pastoral = parts[0] || 'N/A';
                    const responsavel = parts[1] || 'N/A';
                    const tel = parts[2] || 'N/A';
                    const texto = parts.slice(3).join(' | ') || item.descricao;

                    return `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 ${item.status === 'Aprovado' ? 'border-green-500' : 'border-amber-500'}">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <p class="text-[10px] font-black uppercase text-amber-600 tracking-tight">${pastoral}</p>
                                <h3 class="font-bold text-slate-800 leading-tight">${item.titulo}</h3>
                                <p class="text-[11px] text-slate-700 font-bold mt-1 uppercase">👤 ${responsavel}</p>
                                <p class="text-[10px] text-slate-400 font-medium italic mt-0.5">📞 ${tel}</p>
                            </div>
                            <span class="text-[9px] bg-slate-100 px-2 py-1 rounded font-bold uppercase">${item.status}</span>
                        </div>
                        <p class="text-slate-500 text-xs mb-4 mt-2 bg-slate-50 p-3 rounded-lg border border-slate-100">${texto}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">PRAZO: ${item.data_prazo ? item.data_prazo.split('-').reverse().join('/') : 'A definir'}</span>
                            <div class="flex gap-4">
                                ${item.status !== 'Aprovado' ? `<button onclick="status('${item.id}', 'Aprovado')" class="text-green-600 font-bold text-[10px] uppercase hover:underline">Aprovar</button>` : ''}
                                <button onclick="deletar('${item.id}')" class="text-red-400 font-bold text-[10px] uppercase hover:underline">Excluir</button>
                            </div>
                        </div>
                    </div>
                `}).join('');
            }
        }

        async function cadastrarPostagem() {
            const btn = document.getElementById('btn-salvar');
            const past = document.getElementById('solicitante-pastoral').value;
            const nome = document.getElementById('solicitante-nome').value;
            const tel = document.getElementById('solicitante-tel').value;
            const tipo = document.getElementById('novo-titulo').value;
            const desc = document.getElementById('nova-descricao').value;
            const prazo = document.getElementById('novo-prazo').value;

            if (!past || !nome || !tipo) return alert("Por favor, preencha a Pastoral, seu Nome e o Tipo de Solicitação!");
            
            btn.innerText = "ENVIANDO SOLICITAÇÃO...";
            btn.disabled = true;

            // Formato salvo: PASTORAL | NOME | TELEFONE | DESCRIÇÃO
            const descricaoUnificada = `${past.toUpperCase()} | ${nome.toUpperCase()} | ${tel} | ${desc}`;

            const { error } = await meuSupabase.from('postagens').insert([{ 
                titulo: tipo, 
                descricao: descricaoUnificada, 
                data_prazo: prazo, 
                status: 'Pendente' 
            }]);

            if (error) {
                alert("Erro: " + error.message);
                btn.disabled = false;
                btn.innerText = "ENVIAR PARA PRODUÇÃO";
            } else {
                alert("Solicitação enviada com sucesso para a PASCOM!");
                location.reload();
            }
        }

        async function status(id, novo) {
            await meuSupabase.from('postagens').update({ status: novo }).eq('id', id);
            carregarDados();
        }

        async function deletar(id) {
            if(confirm("Deseja apagar este registro?")) {
                await meuSupabase.from('postagens').delete().eq('id', id);
                carregarDados();
            }
        }
    </script>
</body>
</html>
