<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASCOM - Paróquia Santo Antônio de Lisboa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .marrom-psal { background-color: #5D4037; }
        .card-form { background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .input-psal { background-color: #f1f5f9; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .input-psal:focus { border-color: #5D4037; background-color: #ffffff; ring: 2px; outline: none; box-shadow: 0 0 0 2px #5D4037; }
        .aba-ativa { color: #5D4037; border-bottom: 3px solid #5D4037; font-weight: 700; }
    </style>
</head>
<body class="text-slate-800">

    <header class="marrom-psal text-white py-8 px-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold tracking-tight">Paróquia Santo Antônio de Lisboa</h1>
        <p class="text-stone-300 text-xs mt-1 uppercase tracking-widest font-medium">Gestão de Mídia Pastoral</p>
    </header>

    <nav class="flex justify-center bg-white border-b border-slate-200 sticky top-0 z-50">
        <button onclick="mudarAba('solicitante')" id="btn-solicitante" class="px-8 py-4 text-sm uppercase tracking-wider aba-ativa">Solicitante</button>
        <button onclick="mudarAba('admin')" id="btn-admin" class="px-8 py-4 text-sm uppercase tracking-wider text-slate-400 font-medium">Equipe de Produção</button>
    </nav>

    <main class="max-w-2xl mx-auto p-6 md:p-10">
        
        <div id="view-solicitante">
            <div class="card-form p-8 md:p-10">
                <div class="mb-8 border-b border-slate-100 pb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Solicitar Arte</h2>
                    <p class="text-slate-500 mt-1">Preencha os dados abaixo para a equipe de mídia.</p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Pastoral / Comunidade</label>
                        <select id="sol-pastoral" class="input-psal w-full p-4 rounded-xl outline-none">
                            <option value="">Selecione...</option>
                            <option>Acólitos e Coroinhas</option><option>Apostolado da Oração</option><option>Campanha de Arrecadação de Alimentos</option><option>Casa de Acolhimento Madre Tereza</option><option>Com. Nossa Senhora de Fátima</option><option>Com. São Domingos de Gusmão</option><option>Com. São João Batista</option><option>Com. São Mateus</option><option>Coral</option><option>Mesce</option><option>Missão de Fátima</option><option>Oficinas de Oração</option><option>Paroquia Sto. Antônio de Lisboa - Matriz</option><option>Pascom</option><option>Pastoral Acolhida</option><option>Pastoral Batismo</option><option>Pastoral Canto Litúrgico</option><option>Pastoral da Catequese</option><option>Pastoral da Criança</option><option>Pastoral da Saúde</option><option>Pastoral da Sobriedade</option><option>Pastoral do Dízimo</option><option>Pastoral Familiar</option><option>Pastoral Litúrgica</option><option>RCC</option><option>Setor da Juventude</option><option>Terço dos Homens</option><option>Vicentinos</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Seu Nome</label>
                            <input type="text" id="sol-nome" placeholder="Responsável" class="input-psal w-full p-4 rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">WhatsApp</label>
                            <input type="tel" id="sol-tel" placeholder="(00) 00000-0000" class="input-psal w-full p-4 rounded-xl outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Título do evento / aviso / arte</label>
                        <select id="sol-tipo" class="input-psal w-full p-4 rounded-xl outline-none">
                            <option value="">Selecione...</option>
                            <option>Aviso para comunicados</option>
                            <option>Criação de arte para divulgação</option>
                            <option>Evento a ser divulgado</option>
                            <option>Outros</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Data desejada para divulgação</label>
                        <input type="date" id="sol-prazo" class="input-psal w-full p-4 rounded-xl outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Descrição detalhada do pedido*</label>
                        <textarea id="sol-desc" rows="4" placeholder="Local, horários, mensagens importantes..." class="input-psal w-full p-4 rounded-xl outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Link opcional (Inscrição, Etc)</label>
                        <input type="text" id="sol-link" placeholder="Cole o link aqui" class="input-psal w-full p-4 rounded-xl outline-none">
                    </div>

                    <button onclick="enviarPedido()" id="btn-salvar" class="marrom-psal w-full text-white font-bold py-5 rounded-2xl shadow-xl hover:opacity-90 transition-all uppercase tracking-widest text-sm">
                        Enviar Solicitação
                    </button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <div id="login-admin" class="card-form p-10 text-center">
                <h2 class="text-xl font-bold mb-6">Painel Administrativo</h2>
                <input type="password" id="senha-admin" placeholder="Senha" class="input-psal w-full p-4 rounded-xl text-center mb-4 outline-none">
                <button onclick="autenticarAdmin()" class="marrom-psal w-full text-white font-bold py-4 rounded-xl uppercase text-xs tracking-widest">Entrar</button>
            </div>

            <div id="conteudo-admin" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-lg">Pedidos na Fila</h2>
                    <button onclick="carregarDados()" class="text-[10px] uppercase font-black text-stone-400">Atualizar ↻</button>
                </div>
                <div id="lista-demandas" class="grid gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://qasngjqoireicqwjcvgh.supabase.co'; 
        const SB_KEY = 'sb_publishable_pE-axaIPOEd0KCeoh3P6tg_4zbdwLq4';
        const meuSupabase = supabase.createClient(SB_URL, SB_KEY);
        const SENHA_CORRETA = "psal2026"; 

        function mudarAba(aba) {
            document.getElementById('view-solicitante').classList.toggle('hidden', aba === 'admin');
            document.getElementById('view-admin').classList.toggle('hidden', aba === 'solicitante');
            document.getElementById('btn-solicitante').classList.toggle('aba-ativa', aba === 'solicitante');
            document.getElementById('btn-admin').classList.toggle('aba-ativa', aba === 'admin');
        }

        function autenticarAdmin() {
            if (document.getElementById('senha-admin').value === SENHA_CORRETA) {
                document.getElementById('login-admin').classList.add('hidden');
                document.getElementById('conteudo-admin').classList.remove('hidden');
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const lista = document.getElementById('lista-demandas');
            const { data } = await meuSupabase.from('postagens').select('*').order('created_at', { ascending: false });
            if (data) {
                lista.innerHTML = data.map(item => {
                    const p = item.descricao.split(' | ');
                    // Pastoral [0], Nome [1], Tel [2], Desc [3], Link Pedido [4], Link Arte Final [5]
                    return `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 ${item.status === 'Aprovado' ? 'border-green-500' : 'border-amber-500'}">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-[10px] font-bold text-amber-600 uppercase">${p[0] || 'PASTORAL'}</p>
                                <h3 class="font-bold text-slate-800">${item.titulo}</h3>
                                <p class="text-[10px] text-slate-500">Por: <b>${p[1] || 'N/A'}</b></p>
                            </div>
                            <span class="text-[9px] bg-slate-100 px-2 py-1 rounded font-bold uppercase">${item.status}</span>
                        </div>
                        <p class="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg my-3 border border-slate-100">${p[3] || item.descricao}</p>
                        
                        ${item.status !== 'Aprovado' ? `
                            <div class="mt-4 p-3 bg-stone-50 rounded-xl border border-dashed border-stone-200">
                                <label class="text-[9px] font-black uppercase text-stone-400 block mb-1">Link da Arte Finalizada (Canva/Drive):</label>
                                <div class="flex gap-2">
                                    <input type="text" id="link-final-${item.id}" placeholder="Cole o link da arte aqui..." class="flex-1 p-2 text-xs border rounded-lg outline-none focus:ring-1 focus:ring-green-500">
                                    <button onclick="finalizar('${item.id}', '${p[1]}', '${p[2]}', '${item.titulo}')" class="bg-green-600 text-white font-bold text-[10px] px-4 py-2 rounded-lg uppercase">
                                        Enviar Zap
                                    </button>
                                </div>
                            </div>
                        ` : `
                            <div class="mt-2 p-2 bg-green-50 rounded-lg text-[10px] text-green-700 truncate">
                                <b>Arte Final:</b> <a href="${p[5]}" target="_blank" class="underline">${p[5] || 'Sem link'}</a>
                            </div>
                        `}

                        <div class="flex justify-between items-center pt-4 border-t border-slate-50 mt-4">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">DATA: ${item.data_prazo ? item.data_prazo.split('-').reverse().join('/') : '--'}</span>
                            <button onclick="deletar('${item.id}')" class="text-red-300 hover:text-red-500 font-bold text-[9px] uppercase transition-colors">Excluir Pedido</button>
                        </div>
                    </div>
                `}).join('');
            }
        }

        async function enviarPedido() {
            const btn = document.getElementById('btn-salvar');
            const past = document.getElementById('sol-pastoral').value;
            const nome = document.getElementById('sol-nome').value;
            const tel = document.getElementById('sol-tel').value;
            const tipo = document.getElementById('sol-tipo').value;
            const desc = document.getElementById('sol-desc').value;
            const link = document.getElementById('sol-link').value;
            const dataP = document.getElementById('sol-prazo').value;

            if (!past || !nome || !tel || !tipo) return alert("Preencha Pastoral, Nome, WhatsApp e Título!");

            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const descricaoFinal = `${past.toUpperCase()} | ${nome} | ${tel.replace(/\D/g,'')} | ${desc} | ${link} | `;

            const { error } = await meuSupabase.from('postagens').insert([{ titulo: tipo, descricao: descricaoFinal, data_prazo: dataP, status: 'Pendente' }]);

            if (error) { alert("Erro: " + error.message); btn.disabled = false; }
            else { alert("Solicitação enviada com sucesso!"); location.reload(); }
        }

        async function finalizar(id, nome, tel, titulo) {
            const linkArte = document.getElementById(`link-final-${id}`).value;
            if (!linkArte) return alert("Por favor, cole o link da arte finalizada para enviar!");
            
            if (!confirm("Confirmar conclusão e aviso no WhatsApp?")) return;
            
            // Buscar descrição atual para anexar o link da arte no final
            const { data } = await meuSupabase.from('postagens').select('descricao').eq('id', id).single();
            const partes = data.descricao.split(' | ');
            partes[5] = linkArte; // Atualiza o campo de link da arte
            const novaDescricao = partes.join(' | ');

            await meuSupabase.from('postagens').update({ status: 'Aprovado', descricao: novaDescricao }).eq('id', id);
            
            if (tel && tel !== 'undefined') {
                const msg = window.encodeURIComponent(`Olá ${nome}! 🙏 Aqui é da PASCOM (Paróquia Santo Antônio de Lisboa). Passando para avisar que a sua arte para "${titulo}" está pronta!\n\nVocê pode acessar pelo link abaixo:\n${linkArte}`);
                window.open(`https://wa.me/55${tel}?text=${msg}`, '_blank');
            }
            carregarDados();
        }

        async function deletar(id) { if(confirm("Apagar permanentemente este pedido?")) { await meuSupabase.from('postagens').delete().eq('id', id); carregarDados(); } }
    </script>
</body>
</html>
